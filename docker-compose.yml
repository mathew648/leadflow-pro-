services:
  postgres:
    image: postgres:16-alpine
    container_name: lfp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lfp
      POSTGRES_PASSWORD: lfp_dev_password
      POSTGRES_DB: leadflow_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lfp -d leadflow_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lfp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass lfp_redis_password
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "lfp_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  maildev:
    image: maildev/maildev
    container_name: lfp_maildev
    ports:
      - "1080:1080"
      - "1025:1025"

volumes:
  postgres_data:
  redis_data:
