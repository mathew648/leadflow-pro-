<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — TradieJet</title>
  <style>
    body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, system-ui, sans-serif; background: #F9FAFB; color: #111827; text-align: center; padding: 24px; }
    .box { max-width: 360px; }
    .logo { width: 56px; height: 56px; border-radius: 14px; background: #2563EB; display: inline-flex;
      align-items: center; justify-content: center; margin-bottom: 16px; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: #6B7280; font-size: 14px; line-height: 1.5; }
    button { margin-top: 16px; padding: 10px 18px; border: 0; border-radius: 8px; background: #2563EB;
      color: #fff; font-weight: 600; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    <h1>You're offline</h1>
    <p>TradieJet needs a connection for this page. Check your signal and try again — your data is safe.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
